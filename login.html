<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM BOOT INITIALIZATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030508;
            --glow-cyan: #00f3ff;
            --alert-red: #ff3b3b;
            --text-main: #c0cddb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(11, 17, 24, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(11, 17, 24, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 9999;
            background-size: 100% 3px;
            pointer-events: none;
        }

        .boot-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: #0b1118;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.05);
            position: relative;
        }

        .corner-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.7rem;
            color: rgba(0, 243, 255, 0.4);
            letter-spacing: 1px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 1.4rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .warning-text {
            color: var(--alert-red);
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(255, 59, 59, 0.3);
        }

        /* Futuristic Button */
        .boot-btn {
            background: transparent;
            border: 2px solid var(--glow-cyan);
            color: var(--glow-cyan);
            font-family: 'Orbitron', sans-serif;
            padding: 15px 30px;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

            background: var(--glow
